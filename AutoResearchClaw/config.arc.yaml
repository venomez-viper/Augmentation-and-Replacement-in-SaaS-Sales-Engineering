project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

llm:
  provider: "acp"
  acp:
    agent: "claude"
    cwd: "."

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  sandbox:
    python_path: ".venv/Scripts/python.exe"
    gpu_required: false
    max_memory_mb: 4096

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

notifications:
  channel: "console"
  target: ""

knowledge_base:
  backend: "markdown"
  root: "docs/kb"
